<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none"
     stroke="#50fa7b" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <title>approval-hub</title>

  <!-- rounded square frame -->
  <rect x="3" y="3" width="26" height="26" rx="4" stroke-width="2.5"/>

  <!-- check tick (approve) -->
  <polyline points="9,16 12,19 17,12" stroke-width="2"/>

  <!-- cross (deny), offset to the right -->
  <line x1="20" y1="14" x2="24" y2="20"/>
  <line x1="24" y1="14" x2="20" y2="20"/>
</svg>

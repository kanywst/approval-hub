<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640"
     fill="none">
  <title>approval-hub social preview</title>

  <!-- dark background -->
  <rect width="1280" height="640" fill="#1a1d29"/>

  <!-- subtle terminal-like grid (vertical strokes) -->
  <g stroke="#2a2e3e" stroke-width="1">
    <line x1="120" y1="80" x2="120" y2="560"/>
    <line x1="240" y1="80" x2="240" y2="560"/>
    <line x1="1040" y1="80" x2="1040" y2="560"/>
    <line x1="1160" y1="80" x2="1160" y2="560"/>
  </g>

  <!-- icon, centered vertically on the left -->
  <g transform="translate(100 130) scale(0.75)"
     stroke="#50fa7b" stroke-width="24"
     stroke-linecap="round" stroke-linejoin="round">
    <rect x="56" y="56" width="400" height="400" rx="56" stroke-width="28"/>
    <line x1="256" y1="86" x2="256" y2="186"/>
    <polyline points="228,158 256,186 284,158"/>
    <line x1="256" y1="426" x2="256" y2="326"/>
    <polyline points="228,354 256,326 284,354"/>
    <line x1="86" y1="256" x2="186" y2="256"/>
    <polyline points="158,228 186,256 158,284"/>
    <line x1="426" y1="256" x2="326" y2="256"/>
    <polyline points="354,228 326,256 354,284"/>
    <rect x="184" y="184" width="144" height="144" rx="20" stroke-width="22"/>
    <polyline points="206,256 234,284 262,236" stroke-width="18"/>
    <line x1="276" y1="270" x2="308" y2="302" stroke-width="18"/>
    <line x1="308" y1="270" x2="276" y2="302" stroke-width="18"/>
  </g>

  <!-- wordmark -->
  <text x="540" y="290"
        font-family="JetBrains Mono, Fira Code, Menlo, Consolas, monospace"
        font-size="92" font-weight="700" fill="#50fa7b"
        letter-spacing="-2">approval-hub</text>

  <!-- tagline -->
  <text x="540" y="360"
        font-family="JetBrains Mono, Fira Code, Menlo, Consolas, monospace"
        font-size="34" font-weight="400" fill="#bd93f9">
    one TUI for every Claude Code permission prompt
  </text>

  <!-- decorative bracketed keys -->
  <g font-family="JetBrains Mono, Menlo, Consolas, monospace"
     font-size="28" font-weight="500" fill="#6272a4">
    <text x="540" y="460">[ y once ]   [ n deny ]   [ a persist ]   [ d deny-persist ]</text>
  </g>

  <!-- footer mark -->
  <text x="540" y="540"
        font-family="JetBrains Mono, Menlo, Consolas, monospace"
        font-size="22" fill="#6272a4">github.com/kanywst/approval-hub</text>
</svg>

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: approval-hub
    main: ./cmd/approval-hub
    binary: approval-hub
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

brews:
  - name: approval-hub
    repository:
      owner: kanywst
      name: homebrew-tap
    homepage: https://github.com/kanywst/approval-hub
    description: Aggregate Claude Code permission prompts into one TUI.
    license: MIT
    install: |
      bin.install "approval-hub"
    test: |
      system "#{bin}/approval-hub", "--help"
